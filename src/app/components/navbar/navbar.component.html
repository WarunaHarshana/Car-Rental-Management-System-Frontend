<nav class="navbar navbar-expand-lg navbar-dark navbar-custom px-4 py-3" [class.navbar-transparent]="isTransparent">
  <a class="navbar-brand d-flex align-items-center fw-bold fs-4" routerLink="/">
    <i class="bi bi-car-front-fill me-2 brand-text"></i>
    <span class="brand-text">DriveXpress</span>
  </a>

  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarContent">
    <div class="navbar-nav ms-auto align-items-center gap-3">
      <a class="nav-link nav-link-custom" routerLink="/cars" routerLinkActive="active">Explore Fleet</a>

      <ng-container *ngIf="isLoggedIn(); else loggedOut">
        <!-- Admin Links -->
        <a *ngIf="isAdmin()" class="nav-link nav-link-custom" routerLink="/admin" routerLinkActive="active">
          <i class="bi bi-speedometer2 me-1"></i>Admin Dashboard
        </a>
        <a *ngIf="isAdmin()" class="nav-link nav-link-custom" routerLink="/mis-reports" routerLinkActive="active">
          <i class="bi bi-bar-chart-line me-1"></i>MIS Reports
        </a>
        
        <!-- Customer Bookings Link -->
        <a class="nav-link nav-link-custom" routerLink="/my-bookings" routerLinkActive="active">
          <i class="bi bi-journal-bookmark me-1"></i>My Bookings
        </a>

        <!-- User Profile Badge & Details -->
        <div class="user-profile-badge mx-2">
          <div class="user-avatar" [title]="currentUser?.name">
            {{ getUserInitials() }}
          </div>
          <div class="user-info text-start d-none d-sm-flex">
            <span class="user-name">{{ currentUser?.name }}</span>
            <span class="user-email text-muted">{{ currentUser?.email }}</span>
          </div>
          @if (isAdmin()) {
            <span class="role-badge-admin ms-1">Admin</span>
          } @else {
            <span class="role-badge-customer ms-1">Customer</span>
          }
        </div>

        <button class="btn btn-outline-light btn-sm logout-btn" (click)="onLogout()">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </button>
      </ng-container>

      <ng-template #loggedOut>
        <a class="btn btn-outline-light btn-sm px-3 mx-1 rounded-pill" routerLink="/login">
          <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
        </a>
        <a class="btn btn-primary btn-sm px-3 mx-1 rounded-pill" routerLink="/register">
          <i class="bi bi-person-plus me-1"></i>Register
        </a>
      </ng-template>
    </div>
  </div>
</nav>
