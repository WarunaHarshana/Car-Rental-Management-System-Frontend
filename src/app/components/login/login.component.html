<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-lg border-0 rounded-4 overflow-hidden col-12 col-md-8 col-lg-5">
    <div class="card-body p-5">
      
      <div class="text-center mb-4">
        <div class="display-5 text-primary mb-2">
          <i class="bi bi-shield-lock-fill"></i>
        </div>
        <h3 class="fw-bold text-dark">Welcome Back</h3>
        <p class="text-muted small">Sign in to access your car rental dashboard</p>
      </div>

      @if (errorMessage) {
        <div class="alert alert-danger d-flex align-items-center py-2 px-3 small rounded-3 mb-3" role="alert">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <div>{{ errorMessage }}</div>
        </div>
      }
      @if (successMessage) {
        <div class="alert alert-success d-flex align-items-center py-2 px-3 small rounded-3 mb-3" role="alert">
          <i class="bi bi-check-circle-fill me-2"></i>
          <div>{{ successMessage }}</div>
        </div>
      }

      <form #loginForm="ngForm" (ngSubmit)="onLogin()">
        
        <div class="mb-3">
          <label class="form-label text-secondary small fw-bold">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
            <input type="text" 
                   class="form-control bg-light border-start-0 ps-0" 
                   name="username"
                   [(ngModel)]="loginData.username" 
                   required
                   placeholder="Enter your username">
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label text-secondary small fw-bold">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
            <input type="password" 
                   class="form-control bg-light border-start-0 ps-0" 
                   name="password"
                   [(ngModel)]="loginData.password" 
                   required
                   placeholder="Enter your password">
          </div>
        </div>

        <button type="submit" 
                class="btn btn-primary w-100 fw-bold py-2 rounded-3 shadow-sm mb-3"
                [disabled]="!loginForm.form.valid">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>

        <div class="text-center mt-3">
          <p class="small text-muted mb-0">Don't have an account? <a href="#" class="text-primary fw-bold text-decoration-none">Register here</a></p>
        </div>
      </form>

    </div>
  </div>
</div>
