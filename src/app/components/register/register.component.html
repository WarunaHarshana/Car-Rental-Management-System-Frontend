<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-lg border-0 rounded-4 overflow-hidden col-12 col-md-8 col-lg-5">
    <div class="card-body p-5">
      
      <div class="text-center mb-4">
        <div class="display-5 text-primary mb-2">
          <i class="bi bi-person-plus-fill"></i>
        </div>
        <h3 class="fw-bold text-dark">Create Account</h3>
        <p class="text-muted small">Join our fleet management system today</p>
      </div>

      @if (errorMessage) {
        <div class="alert alert-danger d-flex align-items-center py-2 px-3 small rounded-3 mb-3" role="alert">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <div>{{ errorMessage }}</div>
        </div>
      }
      @if (successMessage) {
        <div class="alert alert-success d-flex align-items-center py-2 px-3 small rounded-3 mb-3" role="alert">
          <i class="bi bi-check-circle-fill me-2"></i>
          <div>{{ successMessage }}</div>
        </div>
      }

      <form #registerForm="ngForm" (ngSubmit)="onRegister()">
        
        <div class="mb-3">
          <label class="form-label text-secondary small fw-bold">Full Name</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
            <input type="text" 
                   class="form-control bg-light border-start-0 ps-0" 
                   name="name"
                   [(ngModel)]="registerData.name" 
                   required
                   placeholder="Enter your full name">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label text-secondary small fw-bold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
            <input type="email" 
                   class="form-control bg-light border-start-0 ps-0" 
                   name="email"
                   [(ngModel)]="registerData.email" 
                   required
                   email
                   placeholder="Enter your email address">
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label text-secondary small fw-bold">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
            <input type="password" 
                   class="form-control bg-light border-start-0 ps-0" 
                   name="password"
                   [(ngModel)]="registerData.password" 
                   required
                   minlength="6"
                   placeholder="Create a strong password">
          </div>
        </div>

        <button type="submit" 
                class="btn btn-primary w-100 fw-bold py-2 rounded-3 shadow-sm mb-3"
                [disabled]="!registerForm.form.valid">
          <i class="bi bi-person-check me-2"></i>Sign Up
        </button>

        <div class="text-center mt-3">
          <p class="small text-muted mb-0">Already have an account? <a routerLink="/login" class="text-primary fw-bold text-decoration-none">Login here</a></p>
        </div>
      </form>

    </div>
  </div>
</div>
